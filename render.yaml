services:
  - type: web
    name: xauusd-chart-analyzer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      # เลือกใส่อย่างใดอย่างหนึ่ง (Gemini ฟรี แนะนำสำหรับเริ่มต้น):
      - key: GEMINI_API_KEY
        sync: false          # จาก aistudio.google.com (ฟรี ไม่ต้องผูกบัตร)
      - key: ANTHROPIC_API_KEY
        sync: false          # จาก console.anthropic.com (เสียเงินตามใช้จริง)
